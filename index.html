<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İyi ki Doğdun Ezikko</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle at top, #0d0d0d, #000);
  color:#d4af37;
  font-family:Georgia;
  text-align:center;
}

/* intro */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

button{
  padding:15px 30px;
  background:#d4af37;
  border:none;
  border-radius:30px;
  cursor:pointer;
  margin:10px;
}

h1{font-size:60px;}

.hero{
  padding-top:120px;
}

.gallery img{
  width:180px;
  margin:5px;
  border:2px solid #d4af37;
  border-radius:10px;
}

video{
  width:300px;
  margin-top:20px;
  border:2px solid #d4af37;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>Hazır mısın? ❤️</h1>
  <button onclick="basla()">Başla</button>
</div>

<!-- MÜZİK -->
<audio id="muzik" loop>
  <source src="muzik.mp3" type="audio/mpeg">
</audio>

<div class="hero">

<h1>İyi ki Doğdun Ezikko ✨</h1>

<div id="sayac"></div>

<button onclick="muzikCal()">🎵 Müzik</button>
<button onclick="mesaj()">Sürpriz</button>

<div id="msg" style="display:none;font-size:24px;">
Seni çok seviyorum ❤️
</div>

<br>

<video controls>
  <source src="video.mp4" type="video/mp4">
</video>

</div>

<!-- GALERİ (4 FOTOĞRAF) -->
<div class="gallery">
<img src="foto1.jpeg">
<img src="foto2.jpeg">
<img src="foto3.jpeg">
<img src="foto4.jpeg">
</div>

<script>

// intro kapat
function basla(){
  document.getElementById("intro").style.display="none";
}

// müzik
function muzikCal(){
  document.getElementById("muzik").play();
}

// mesaj
function mesaj(){
  document.getElementById("msg").style.display="block";
}

// sayaç (28 Nisan 2026)
const baslangic = new Date("2026-04-28");

function guncelle(){
  const simdi = new Date();
  const fark = simdi - baslangic;
  const gun = Math.floor(fark / (1000*60*60*24));

  document.getElementById("sayac").innerText =
    "❤️ Birlikte " + gun + " gündür";
}

setInterval(guncelle, 1000);
guncelle();

</script>

</body>
</html>
